<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page Not Found | McMillan Tendering</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="/styles.css">
    <script>
        (function () {
            const path = window.location.pathname.replace(/\/+$/, "");
            const submissionsDownloadPath = "/downloads/submissions-pdf.exe";
            const submissionsDownloadUrl = "https://github.com/stu-macca/mcmillan-downloads/releases/download/submissions-pdf-v1.0.0/Submissions.PDF.Setup.1.0.0.exe";

            if (path === submissionsDownloadPath) {
                window.location.replace(submissionsDownloadUrl);
            }
        }());
    </script>
</head>
<body>
    <main class="container">
        <section>
            <hgroup>
                <h1>Page not found</h1>
                <p>The page you requested is not available.</p>
            </hgroup>
            <p>If you were trying to download Submissions PDF, use the product page below.</p>
            <p><a href="/apps/submissions-pdf.html" role="button">View Submissions PDF</a></p>
        </section>
    </main>
</body>
</html>
